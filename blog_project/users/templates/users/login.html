{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <!-- Required meta tags -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Majestic Admin</title>
  <!-- plugins:css -->
  <link rel="stylesheet" href="{% static 'vendors/mdi/css/materialdesignicons.min.css' %}">
  <link rel="stylesheet" href="{% static 'vendors/base/vendor.bundle.base.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/formvalidation/0.6.2-dev/css/formValidation.min.css" integrity="sha512-B9GRVQaYJ7aMZO3WC2UvS9xds1D+gWQoNiXiZYRlqIVszL073pHXi0pxWxVycBk0fnacKIE3UHuWfSeETDCe7w==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
  <!-- endinject -->
  <!-- plugin css for this page -->
  <!-- End plugin css for this page -->
  <!-- inject:css -->
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <!-- endinject -->
  <link rel="shortcut icon" href="{% static 'images/favicon.png' %}" />
</head>

<body>
  <div class="container-scroller">
    <div class="container-fluid page-body-wrapper full-page-wrapper">
      <div class="content-wrapper d-flex align-items-stretch auth auth-img-bg">
        <div class="row flex-grow">
          <div class="col-lg-6 d-flex align-items-center justify-content-center">
            <div class="auth-form-transparent text-left p-3">
              <h4>Login</h4>
              <form id="loginForm" name="LoginForm" class="pt-3" method="POST" action="{% url 'users:login' %}">
                {% csrf_token %}
                <div class="form-group">
                  <label for="exampleInputName">Name</label>
                  <div class="input-group">
                    <div class="input-group-prepend bg-transparent">
                      
                    </div>
                    <input type="text" class="form-control form-control-lg" name="exampleInputName" id="exampleInputName" placeholder="Username">
                  </div>
                </div>
                <div class="form-group">
                  <label for="exampleInputPassword">Password</label>
                  <div class="input-group">
                    <div class="input-group-prepend bg-transparent">
                      
                    </div>
                    <input type="password" class="form-control form-control-lg" name="exampleInputPassword" id="exampleInputPassword" placeholder="Password">                        
                  </div>
                </div>                
                <div class="my-3">
                  <button type="submit" class="btn btn-block btn-primary btn-lg font-weight-medium auth-form-btn">SUBMIT</button>
                </div>
                <div class="text-center mt-4 font-weight-light">
                  Don't have an account? <a href="{% url 'users:register' %}" class="text-primary">Create</a>
                </div>
              </form>
            </div>
          </div>
          <div class="col-lg-6 login-half-bg d-flex flex-row">
            <p class="text-white font-weight-medium text-center flex-grow align-self-end">Copyright &copy; 2020  All rights reserved.</p>
          </div>
        </div>
      </div>
      <!-- content-wrapper ends -->
    </div>
    <!-- page-body-wrapper ends -->
  </div>
  <!-- container-scroller -->

  <!-- Optional JavaScript; choose one of the two! -->
  <script src="{% static 'dist/js/jquery-4.0.0.min.js' %}"></script>
  
  <!-- Option 1: Bootstrap Bundle with Popper -->
  <script src="{% static 'dist/js/bootstrap.bundle.min.js' %}"></script>
  
  <!-- Option 2: Separate Popper and Bootstrap JS -->
  <!--
    <script src="{% static 'dist/umd/popper.min.js' %}"></script>
    <script src="{% static 'dist/js/bootstrap.min.js' %}"></script>
-->

<script src="{% static 'dist/js/jquery.validate.min.js' %}"></script>
<script src="{% static 'dist/js/additional-methods.min.js' %}"></script>


  <!-- plugins:js -->
  {% comment %} <script src="{% static 'vendors/base/vendor.bundle.base.js' %}"></script> {% endcomment %}
  <!-- endinject -->
  <!-- inject:js -->
  <script src="{% static 'js/off-canvas.js' %}"></script>
  <script src="{% static 'js/hoverable-collapse.js' %}"></script>
  <script src="{% static 'js/template.js' %}"></script>
  <!-- endinject -->
  
  <script>
    $(document).ready(function(){
        $("#loginForm").validate({
            errorPlacement: function(error, element) {
                // 'error' is the label/element containing the message
                // 'element' is the input field that failed validation
                error.insertAfter(element.parent()); 
            },
            errorElement: "p", // Now error messages wrap to the next line
            errorClass: "text-danger", // Adds custom CSS classes to the error element
            rules: {
                exampleInputName: { 
                    required: true, 
                    minlength: 3 
                },
                exampleInputPassword: { 
                    required: true 
                }
            },
            messages: {
                exampleInputName: "Please enter your name",
                exampleInputPassword: "Please enter a valid password"
            },
            submitHandler: function(form) {
                console.log("1...");
                return false;
                // This part only runs if the form passes all rules
                $.ajax({
                    url: form.action,
                    type: 'POST',
                    data: $(form).serialize(),
                    success: function(response) {
                        alert('Form submitted successfully!');
                    }
                });
                return false; // Prevents the browser from doing a traditional POST
            }
        });
    });
  </script>
</body>

</html>
